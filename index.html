<title>黄金价格趋势监测</title>
<meta name="description" content="流量定价体制框架下的黄金价格趋势公开监测看板：锚缺口、流量乘数、CTA 模拟仓位、金银相关象限与 13 周情景推演。每日自动更新。">
<style>
:root{
  --daimon-widget-host-safe-inline-end:190px;--daimon-widget-host-safe-block-start:44px;
  /* Kimi 设计令牌 · light（等价替换 var(--kimi-color-*) 运行时注入） */
  --kimi-color-background:#ffffff;
  --kimi-color-text-primary:#1f2329;
  --kimi-color-text-secondary:#4e5562;
  --kimi-color-text-tertiary:#8a8f99;
  --kimi-color-text-quaternary:#b3b8c2;
  --kimi-color-border:#e6e8ec;
  --kimi-color-surface-muted:#f4f5f7;
  --kimi-color-accent:#4d6bfe;
  --kimi-color-positive:#16a34a;
  --kimi-color-danger:#dc2626;
  --kimi-color-warning:#d97706;
}
@media (prefers-color-scheme: dark){
  :root{
    --kimi-color-background:#16181d;
    --kimi-color-text-primary:#e8eaed;
    --kimi-color-text-secondary:#b0b6c0;
    --kimi-color-text-tertiary:#8a9099;
    --kimi-color-text-quaternary:#5f6672;
    --kimi-color-border:#2e323a;
    --kimi-color-surface-muted:#21252c;
    --kimi-color-accent:#7f9aff;
    --kimi-color-positive:#34c47c;
    --kimi-color-danger:#ef5f6b;
    --kimi-color-warning:#e8a13d;
  }
}
.kimi-host-safe-context{container-type:inline-size;}
.kimi-host-safe-header{box-sizing:border-box;min-block-size:var(--daimon-widget-host-safe-block-start,44px);padding-inline-end:var(--daimon-widget-host-safe-inline-end,190px);}
@container (max-width:419px){.kimi-host-safe-header{min-block-size:0;padding-block-start:var(--daimon-widget-host-safe-block-start,44px);padding-inline-end:0;}}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--kimi-color-background);}
body{
  font-family:var(--kimi-font-sans,system-ui,-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif);
  color:var(--kimi-color-text-primary);
  font-size:13px;line-height:1.5;letter-spacing:0;
  padding:4px 14px 18px;
}
main{max-width:1120px;}
h1{font-size:17px;font-weight:650;}
.meta{color:var(--kimi-color-text-tertiary);font-size:11.5px;margin-top:2px;}
h2.sec{font-size:13.5px;font-weight:600;margin:20px 0 8px;color:var(--kimi-color-text-primary);}
.mono{font-family:var(--kimi-font-mono,ui-monospace,monospace);}
.num{font-variant-numeric:tabular-nums;}

#status-pill{display:inline-block;padding:1px 8px;border-radius:99px;font-size:11px;margin-left:6px;}
#status-pill.running{background:color-mix(in srgb,var(--kimi-color-warning) 18%,transparent);color:var(--kimi-color-warning);}
#status-pill.error{background:color-mix(in srgb,var(--kimi-color-danger) 15%,transparent);color:var(--kimi-color-danger);}
#status-pill.ok{background:color-mix(in srgb,var(--kimi-color-positive) 15%,transparent);color:var(--kimi-color-positive);}

/* P0 */
.p0{display:flex;flex-wrap:wrap;gap:16px 36px;align-items:flex-end;margin-top:10px;padding-bottom:14px;border-bottom:1px solid var(--kimi-color-border);}
.price-block output{display:block;font-size:34px;font-weight:680;line-height:1.1;font-variant-numeric:tabular-nums;}
.price-block .unit{font-size:11.5px;color:var(--kimi-color-text-tertiary);}
.chg{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
.chg.up{color:var(--kimi-color-positive);}
.chg.down{color:var(--kimi-color-danger);}
.regime-block h2{font-size:15px;font-weight:650;line-height:1.35;}
.regime-block .stage-tag{display:inline-block;font-size:11px;font-weight:600;padding:1px 8px;border-radius:4px;background:color-mix(in srgb,var(--kimi-color-warning) 16%,transparent);color:var(--kimi-color-warning);margin-bottom:4px;}
.confirm-line{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:2px 9px;border-radius:99px;background:var(--kimi-color-surface-muted);color:var(--kimi-color-text-secondary);}
.chip .dot{width:7px;height:7px;border-radius:50%;}
.dot.ok{background:var(--kimi-color-positive);}
.dot.no{background:var(--kimi-color-danger);}
.confirm-count{font-size:12px;font-weight:650;color:var(--kimi-color-text-secondary);}
.action-hint{width:100%;font-size:12px;color:var(--kimi-color-text-secondary);margin-top:8px;}

/* indicator cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-top:14px;}
.card{background:var(--kimi-color-surface-muted);border-radius:10px;padding:10px 12px;min-width:0;}
.card .clabel{font-size:11.5px;color:var(--kimi-color-text-tertiary);display:flex;align-items:center;gap:6px;}
.card .cvalue{display:block;font-size:20px;font-weight:660;line-height:1.2;margin-top:3px;font-variant-numeric:tabular-nums;}
.card .csub{font-size:11px;color:var(--kimi-color-text-secondary);margin-top:3px;line-height:1.45;}

/* charts */
.chart-box{margin-top:6px;}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--kimi-color-text-secondary);margin:6px 0 2px;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.sw{width:14px;height:3px;border-radius:2px;display:inline-block;}
svg{display:block;width:100%;height:auto;}

/* scenarios */
.scenarios{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:14px;}
.scn{border-radius:10px;padding:10px 12px;background:var(--kimi-color-surface-muted);border-left:3px solid var(--kimi-color-text-quaternary);}
.scn.bull{border-left-color:var(--kimi-color-positive);}
.scn.base{border-left-color:var(--kimi-color-accent);}
.scn.bear{border-left-color:var(--kimi-color-danger);}
.scn .sname{font-size:12.5px;font-weight:650;}
.scn .sprob{float:right;font-size:12px;font-weight:660;color:var(--kimi-color-text-secondary);font-variant-numeric:tabular-nums;}
.scn .send{margin-top:4px;font-size:16px;font-weight:660;font-variant-numeric:tabular-nums;}
.scn .sret{font-size:12px;font-weight:600;margin-left:6px;}
.scn .sdesc{font-size:11.5px;color:var(--kimi-color-text-secondary);margin-top:5px;line-height:1.5;}
.method-note{font-size:11px;color:var(--kimi-color-text-tertiary);margin-top:8px;}

/* minis */
.minis{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:6px;}
.mini{background:var(--kimi-color-surface-muted);border-radius:10px;padding:9px 12px;}
.mini .mtitle{font-size:11.5px;color:var(--kimi-color-text-tertiary);display:flex;justify-content:space-between;gap:8px;}
.mini .mval{font-size:14px;font-weight:660;color:var(--kimi-color-text-primary);font-variant-numeric:tabular-nums;}

/* events table */
.table-wrap{margin-top:6px;overflow-x:auto;}
table{border-collapse:collapse;width:100%;min-width:560px;font-size:12px;font-variant-numeric:tabular-nums;}
th{font-weight:600;color:var(--kimi-color-text-tertiary);text-align:right;padding:5px 8px;border-bottom:1px solid var(--kimi-color-border);white-space:nowrap;}
th:first-child,td:first-child{text-align:left;}
td{padding:5px 8px;border-bottom:1px solid var(--kimi-color-border);text-align:right;color:var(--kimi-color-text-secondary);}
td.pos{color:var(--kimi-color-positive);}
td.neg{color:var(--kimi-color-danger);}
tr:last-child td{border-bottom:none;}

/* caveats */
footer{margin-top:18px;padding-top:10px;border-top:1px solid var(--kimi-color-border);}
footer p{font-size:11px;color:var(--kimi-color-text-quaternary);line-height:1.6;}
footer p b{color:var(--kimi-color-text-tertiary);font-weight:600;}

/* compact tier */
html[data-daimon-size-tier="compact"] [data-kimi-priority="p1"],
html[data-daimon-size-tier="compact"] [data-kimi-priority="p2"],
html[data-daimon-size-tier="compact"] [data-kimi-priority="p3"]{display:none;}
html[data-daimon-size-tier="compact"] .price-block output{font-size:26px;}
html[data-daimon-size-tier="compact"] .regime-block h2{font-size:13px;}

@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>

function $(id){ try { return document.getElementById(id); } catch(e){ return null; } }
function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(n, d){ if(n===null||n===undefined||isNaN(n)) return '—'; return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:d??1,maximumFractionDigits:d??1}); }
function sign(n, d){ if(n===null||n===undefined||isNaN(n)) return '—'; return (n>0?'+':'')+fmt(n,d); }

const NS='http://www.w3.org/2000/svg';
function S(tag, attrs, parent){ const el=document.createElementNS(NS,tag); for(const k in attrs) el.setAttribute(k,attrs[k]); if(parent) parent.appendChild(el); return el; }
const INK='var(--kimi-color-text-primary)', SUB='var(--kimi-color-text-tertiary)', FAINT='var(--kimi-color-text-quaternary)',
      ACCENT='var(--kimi-color-accent)', POS='var(--kimi-color-positive)', NEG='var(--kimi-color-danger)', BORDER='var(--kimi-color-border)';

function render(d){
  if(!d || !d.price) return;
  const p=d.price, ind=d.indicators, rg=d.regime, fc=d.forecast, sr=d.series;

  $('asof').textContent = d.as_of || '—';

  // P0
  $('p-price').textContent = fmt(p.gold_usd,0);
  const chg=$('p-chg'); chg.textContent = sign(p.week_chg_pct,2)+'%'; chg.className='chg num '+(p.week_chg_pct>=0?'up':'down');
  $('p-stage').textContent = rg.stage || '—';
  const c=ind.confirmation;
  const chips=[
    {t:'翻空≤2/4（现 '+ind.cta.flip_count+'/4）', ok:c.flip_ok},
    {t:'相关分位<90（现 '+fmt(ind.correlation.percentile,0)+'）', ok:c.corr_ok},
    {t:'收复MA60', ok:c.ma60_ok}
  ];
  $('p-chips').innerHTML = chips.map(x=>`<span class="chip"><span class="dot ${x.ok?'ok':'no'}"></span>${esc(x.t)}</span>`).join('')
    + `<span class="confirm-count">确认信号 ${c.count}/3${c.count>=2?' · 达重建阈值':''}</span>`;
  $('p-hint').textContent = rg.action_hint || '';

  // indicator cards
  const g=ind.anchor_gap, m=ind.flow_multiplier, cta=ind.cta, cor=ind.correlation, dd=ind.drawdown;
  const quadTxt = cor.quadrant==='high_down'?'高相关+下跌（出清象限）':cor.quadrant==='high_up'?'高相关+上涨（篮子上行）':'低相关（正常定价）';
  const cards=[
    {l:'锚缺口 · vs 2016-21旧锚', v:sign(g.pct,0)+'%', s:`峰值 +${fmt(g.peak_pct,0)}% @ ${g.peak_date} · 序数度量非估值`, warn:g.pct>200},
    {l:'流量乘数 M · 52周滚动', v:fmt(m.latest_bp,1)+'bp', s:`每1%OI净流入的价格冲击 · 52周均值 ${fmt(m.mean_bp,1)}bp`, warn:m.latest_bp<15},
    {l:'CTA 模拟仓位', v:fmt(cta.pos,2), s:`近3年 ${fmt(cta.pos_percentile,0)}% 分位 · 信号翻空 ${cta.flip_count}/4 · σ ${fmt(cta.vol20_ann*100,0)}%`, warn:cta.pos<0},
    {l:'金银12周相关 · 3年分位', v:fmt(cor.percentile,0)+'%', s:`corr ${fmt(cor.corr_12w,2)} · ${quadTxt}`, warn:cor.percentile>=90&&cor.direction==='down'},
    {l:'当前回撤 · 距60日高点', v:fmt(dd.current_pct,1)+'%', s:dd.in_event?`急跌事件中 · 始于 ${dd.event_start}`:'未处于急跌事件', warn:dd.in_event}
  ];
  $('cards').innerHTML = cards.map(x=>`<div class="card"><span class="clabel"><span class="dot ${x.warn?'no':'ok'}"></span>${esc(x.l)}</span><output class="cvalue num">${esc(x.v)}</output><span class="csub">${esc(x.s)}</span></div>`).join('');

  drawMain(sr, fc);
  renderScenarios(fc);
  drawMinis(sr, ind);
  renderEvents(d.history_events||[]);
  renderCaveats(d);
}

function drawMain(sr, fc){
  const box=$('chart-main'); if(!box||!sr||!sr.dates) return; box.innerHTML='';
  const W=Math.max(box.clientWidth||720, 280), H= W<520?240:330;
  const pad={l:46,r:88,t:10,b:20};
  const hist=sr.gold_usd, anch=sr.anchor_implied, dates=sr.dates, wk=fc.weeks||[];
  const n=hist.length, nf=wk.length, N=n+nf;
  const lastP=hist[n-1];
  const xs=i=> pad.l + i*(W-pad.l-pad.r)/(N-1);
  let lo=Infinity, hi=-Infinity;
  const eat=v=>{ if(v==null||isNaN(v))return; if(v<lo)lo=v; if(v>hi)hi=v; };
  hist.forEach(eat); anch.forEach(eat);
  wk.forEach(w=>{eat(w.p10);eat(w.p90);eat(w.bull);eat(w.bear);});
  const mg=(hi-lo)*0.06||1; lo-=mg; hi+=mg;
  const ys=v=> pad.t + (hi-v)*(H-pad.t-pad.b)/(hi-lo);

  const svg=S('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H},box);
  // gridlines
  for(let k=0;k<=3;k++){ const v=lo+(hi-lo)*k/3, y=ys(v);
    S('line',{x1:pad.l,y1:y,x2:W-pad.r+60,y2:y,stroke:BORDER,'stroke-width':0.6},svg);
    const t=S('text',{x:pad.l-6,y:y+3,'text-anchor':'end','font-size':9.5,style:`fill:${SUB};font-variant-numeric:tabular-nums;`},svg);
    t.textContent=fmt(v,0);
  }
  // x ticks ~ every 26w history + forecast end
  for(let i=0;i<n;i+=26){ const t=S('text',{x:xs(i),y:H-5,'text-anchor':'middle','font-size':9,style:`fill:${FAINT};`},svg); t.textContent=(dates[i]||'').slice(2,7); }
  if(nf){ const t=S('text',{x:xs(N-1),y:H-5,'text-anchor':'middle','font-size':9,style:`fill:${FAINT};`},svg); t.textContent=(wk[nf-1].date||'').slice(2,7); }
  // forecast/history divider
  S('line',{x1:xs(n-1),y1:pad.t,x2:xs(n-1),y2:H-pad.b,stroke:FAINT,'stroke-width':0.8,'stroke-dasharray':'3 3'},svg);
  const dt=S('text',{x:xs(n-1)+4,y:pad.t+9,'font-size':9.5,style:`fill:${SUB};`},svg); dt.textContent='今日 →';

  // band
  if(nf){
    let pts=`${xs(n-1)},${ys(lastP)} `;
    wk.forEach((w,j)=>{ pts+=`${xs(n+j)},${ys(w.p90)} `; });
    for(let j=nf-1;j>=0;j--) pts+=`${xs(n+j)},${ys(wk[j].p10)} `;
    S('polygon',{points:pts,style:`fill:color-mix(in srgb,${ACCENT} 13%,transparent);stroke:none;`},svg);
  }
  const path=(arr,off)=>arr.map((v,i)=>(i?'L':'M')+xs(off+i).toFixed(1)+','+ys(v).toFixed(1)).join(' ');
  // anchor implied
  S('path',{d:path(anch,0),fill:'none',style:`stroke:${FAINT};`,'stroke-width':1.2,'stroke-dasharray':'4 3'},svg);
  // price
  S('path',{d:path(hist,0),fill:'none',style:`stroke:${INK};`,'stroke-width':1.8},svg);
  // scenarios
  const scn=[['base',ACCENT,1.6],['bull',POS,1.2],['bear',NEG,1.2]];
  const ends=[];
  scn.forEach(([k,col,wd])=>{
    const arr=[lastP].concat(wk.map(w=>w[k]));
    S('path',{d:path(arr,n-1),fill:'none',style:`stroke:${col};`,'stroke-width':wd,'stroke-dasharray':k==='base'?'5 3':'2 3'},svg);
    ends.push({k,col,v:wk[nf-1][k]});
  });
  // direct labels at right, avoid collision
  ends.sort((a,b)=>ys(b.v)-ys(a.v));
  let prevY=-1e9;
  ends.forEach(e=>{ let y=ys(e.v); if(y<prevY+12) y=prevY+12; prevY=y;
    const t=S('text',{x:W-pad.r+8,y:y+3,'font-size':10,'font-weight':600,style:`fill:${e.col};font-variant-numeric:tabular-nums;`},svg);
    t.textContent=fmt(e.v,0);
  });
  const lp=S('text',{x:xs(n-1)-4,y:ys(lastP)-6,'text-anchor':'end','font-size':10,'font-weight':600,style:`fill:${INK};font-variant-numeric:tabular-nums;`},svg);
  lp.textContent=fmt(lastP,0);

  const lg=$('main-legend');
  lg.innerHTML=[
    [INK,'金价（周）'],['dash '+FAINT,'旧锚隐含'],['dash '+ACCENT,'基准'],[POS,'乐观'],[NEG,'悲观'],['band','p10–p90 带']
  ].map(([c,t])=>{
    let st;
    if(c==='band') st=`background:color-mix(in srgb,${ACCENT} 20%,transparent)`;
    else if(String(c).startsWith('dash ')) st=`background:repeating-linear-gradient(90deg,${c.slice(5)} 0 4px,transparent 4px 7px)`;
    else st=`background:${c}`;
    return `<span><span class="sw" style="${st}"></span>${t}</span>`;
  }).join('');
}

function renderScenarios(fc){
  const box=$('scenarios'); if(!box) return;
  box.innerHTML=(fc.scenarios||[]).map(s=>`
    <div class="scn ${esc(s.key)}">
      <span class="sprob">P ${fmt(s.prob*100,0)}%</span>
      <span class="sname">${esc(s.name)}</span>
      <div><span class="send num">${fmt(s.end_price,0)}</span><span class="sret num" style="color:${s.end_ret_pct>=0?POS:NEG}">${sign(s.end_ret_pct,1)}%</span></div>
      <p class="sdesc">${esc(s.desc)}</p>
    </div>`).join('');
  $('method-note').textContent=fc.method_note||'';
}

function drawMinis(sr, ind){
  const box=$('minis'); if(!box||!sr) return; box.innerHTML='';
  const defs=[
    {t:'锚缺口 %', arr:sr.gap_pct, d:0, th:null, last:sign(ind.anchor_gap.pct,0)+'%'},
    {t:'流量乘数 bp', arr:sr.m_bp, d:1, th:ind.flow_multiplier.mean_bp, thT:'均值', last:fmt(ind.flow_multiplier.latest_bp,1)},
    {t:'CTA 仓位', arr:sr.cta_pos, d:2, th:0, thT:'0轴', last:fmt(ind.cta.pos,2)},
    {t:'金银相关分位 %', arr:sr.corr_pctile, d:0, th:90, thT:'90线', last:fmt(ind.correlation.percentile,0)}
  ];
  defs.forEach(df=>{
    const card=document.createElement('div'); card.className='mini';
    card.innerHTML=`<span class="mtitle">${df.t}<span class="mval num">${df.last}</span></span>`;
    box.appendChild(card);
    const W=Math.max(card.clientWidth-24||220,160), H=64, pad={l:4,r:4,t:5,b:4};
    const svg=S('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',height:H,style:'margin-top:4px;'},card);
    const vals=df.arr.filter(v=>v!=null&&!isNaN(v)); if(!vals.length) return;
    let lo=Math.min(...vals), hi=Math.max(...vals);
    if(df.th!=null){ lo=Math.min(lo,df.th); hi=Math.max(hi,df.th); }
    const mg=(hi-lo)*0.08||1; lo-=mg; hi+=mg;
    const xs=i=>pad.l+i*(W-pad.l-pad.r)/(vals.length-1), ys=v=>pad.t+(hi-v)*(H-pad.t-pad.b)/(hi-lo);
    if(df.th!=null) S('line',{x1:0,y1:ys(df.th),x2:W,y2:ys(df.th),style:`stroke:${FAINT};`,'stroke-width':0.8,'stroke-dasharray':'3 3'},svg);
    S('path',{d:vals.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+','+ys(v).toFixed(1)).join(' '),fill:'none',style:`stroke:${INK};`,'stroke-width':1.3},svg);
    S('circle',{cx:xs(vals.length-1),cy:ys(vals[vals.length-1]),r:2.4,style:`fill:${ACCENT};`},svg);
  });
}

function renderEvents(ev){
  const tb=$('events'); if(!tb) return;
  const cls=v=>v>0?'pos':v<0?'neg':'';
  tb.innerHTML='<tr><th>事件日</th><th>回撤</th><th>ΔOI</th><th>ΔMM/OI</th><th>CTA翻空时点</th><th>T+20</th><th>T+40</th></tr>'
    + ev.map(e=>`<tr><td>${esc(e.date)}</td><td class="neg">${fmt(e.dd_pct,1)}%</td><td>${fmt(e.d_oi_pct,0)}%</td><td>${fmt(e.d_mm_oi_pct,1)}%</td><td style="text-align:right">${esc(e.flip_timing)}</td><td class="${cls(e.t20_pct)}">${sign(e.t20_pct,1)}%</td><td class="${cls(e.t40_pct)}">${sign(e.t40_pct,1)}%</td></tr>`).join('');
}

function renderCaveats(d){
  const f=$('caveats'); if(!f) return;
  const cv=(d.caveats||[]).map(x=>esc(x)).join('　·　');
  f.innerHTML=`<p><b>解读纪律</b>　${cv}</p><p style="margin-top:6px;">框架来源：《黄金定价失真归因报告 v3》（G1锚断裂 / G2流量乘数 / G6定价权切换 / G4相关性象限 / G5接棒出清）· 数据：akshare 上海金/银、FRED、CFTC COT · 生成于 ${esc(d.generated_at||'—')} · 不构成投资建议</p>`;
}

const GITHUB_REPO = 'https://github.com/corgipotato-cyber/gold-monitor';
let CURRENT_DATA = INITIAL_DATA;  // fetch 失败时的内嵌兜底

(function init(){
  try{
    const a=document.getElementById('repo-link'); if(a) a.href=GITHUB_REPO;
    render(CURRENT_DATA);
    let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ try{ render(CURRENT_DATA); }catch(e){} },180); });
    fetch('data.json?ts='+Date.now())
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(d=>{ if(d && d.as_of){ CURRENT_DATA=d; render(d); } })
      .catch(()=>{ /* 数据文件不可达时保留内嵌兜底数据 */ });
  }catch(e){}
})();
